<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纯文本·缓存记事本</title>
    <style>
        /* 极简风格，纯粹文本记事本 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #fafaf8;
            font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .notepad {
            width: 100%;
            max-width: 750px;
            background-color: #fffefc;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05), 0 0 0 1px #f0ede9 inset;
            padding: 28px 28px 32px;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 400;
            color: #3a3a3a;
            margin-top: 0;
            margin-bottom: 6px;
            letter-spacing: -0.01em;
            border-bottom: 1px solid #eae7e2;
            padding-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        h1 span {
            background: #ecebe6;
            font-size: 0.8rem;
            font-weight: 400;
            padding: 4px 12px;
            border-radius: 30px;
            color: #4f4c46;
            letter-spacing: 0.3px;
        }
        .editor-area {
            margin: 22px 0 18px;
        }
        textarea {
            width: 100%;
            min-height: 340px;
            padding: 20px 22px;
            border: none;
            background: #fffcf7;
            border-radius: 16px;
            font-size: 1rem;
            line-height: 1.65;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', 'Monaco', monospace;
            resize: vertical;
            color: #2b2b2b;
            caret-color: #4f7a7a;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.02), inset 0 0 0 1px #e3dfd9;
            outline: none;
            transition: box-shadow 0.1s;
        }
        textarea:focus {
            box-shadow: inset 0 1px 5px rgba(80, 80, 80, 0.03), inset 0 0 0 2px #cbd5d0;
            background: #fffdfa;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 18px 0 8px;
            color: #5c5c5a;
            font-size: 0.85rem;
            padding: 0 4px;
        }
        .cache-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f3f1ee;
            padding: 6px 16px;
            border-radius: 40px;
            color: #3d3d38;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            background: #fff;
            border: 1px solid #dbd7d0;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 450;
            color: #3a3a3a;
            cursor: pointer;
            transition: 0.12s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #ffffff;
        }
        .btn:hover {
            background: #f3f1ee;
            border-color: #b3aea7;
            color: #1f1f1f;
        }
        .btn:active {
            background: #e3dfd9;
            transform: scale(0.98);
        }
        .btn-save {
            background: #eae9e3;
            border-color: #b9b6ad;
            font-weight: 500;
        }
        .btn-save:hover {
            background: #dad8cf;
            border-color: #9e9a92;
        }
        .word-count {
            background: transparent;
            padding: 6px 12px;
            border-radius: 30px;
            border: 1px solid #e2dfd9;
            color: #5e5e59;
        }
        hr {
            border: none;
            border-top: 1px solid #e7e4df;
            margin: 22px 0 10px;
        }
        .footer-note {
            font-size: 0.75rem;
            color: #94908b;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 16px;
        }
        .clear-btn {
            background: none;
            border: none;
            color: #8b8882;
            text-decoration: underline dotted;
            font-size: 0.75rem;
            cursor: pointer;
            padding: 4px 8px;
        }
        .clear-btn:hover {
            color: #4c4a46;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="notepad">
        <h1>
            📓 纯文本记事本
            <span>localStorage</span>
        </h1>
        
        <!-- 核心：文本输入区 · 没有任何格式化，纯文本 -->
        <div class="editor-area">
            <textarea id="notepadTextarea" placeholder="✍️ 在这里写点东西…… (自动保存在浏览器缓存中)"></textarea>
        </div>
        
        <!-- 状态栏：缓存状态 + 字数统计 -->
        <div class="status-bar">
            <div class="cache-indicator" id="cacheStatus">
                <span>💾</span> <span id="cacheMessage">缓存已就绪</span>
            </div>
            <div class="word-count" id="wordCountDisplay">
                0 字符
            </div>
        </div>
        
        <!-- 操作按钮组：手动保存 / 加载 / 清空编辑器 (缓存独立操作) -->
        <div class="btn-group">
            <button class="btn btn-save" id="saveBtn">💿 保存到缓存</button>
            <button class="btn" id="loadBtn">📂 从缓存加载</button>
            <button class="btn" id="clearEditorBtn">🗑️ 清空编辑器</button>
            <button class="btn" id="downloadBtn">📥 下载为TXT</button>
        </div>
        
        <hr>
        
        <!-- 底部：缓存独立清理，不丢失编辑器内容（但可单独清除缓存） -->
        <div class="footer-note">
            <span>📌 修改后自动保存 · 关闭页面再打开，内容还在</span>
            <button class="clear-btn" id="clearCacheBtn">清除缓存数据</button>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            // --- 缓存键名 ---
            const STORAGE_KEY = "plain_text_notepad_v1";

            // --- DOM 元素 ---
            const textarea = document.getElementById("notepadTextarea");
            const saveBtn = document.getElementById("saveBtn");
            const loadBtn = document.getElementById("loadBtn");
            const clearEditorBtn = document.getElementById("clearEditorBtn");
            const clearCacheBtn = document.getElementById("clearCacheBtn");
            const downloadBtn = document.getElementById("downloadBtn");
            const cacheMessage = document.getElementById("cacheMessage");
            const wordCountDisplay = document.getElementById("wordCountDisplay");

            // --- 辅助函数: 更新字数统计 ---
            function updateWordCount() {
                const text = textarea.value;
                const charCount = text.length;
                wordCountDisplay.textContent = charCount + ' 字符';
            }

            // --- 辅助函数: 显示缓存状态消息（短暂提示 + 图标变化）---
            function showCacheMessage(msg, isPermanent = false) {
                cacheMessage.textContent = msg;
                if (!isPermanent) {
                    // 短暂提示后恢复常规状态（3.5秒后恢复默认）
                    clearTimeout(window._cacheMsgTimer);
                    window._cacheMsgTimer = setTimeout(() => {
                        // 恢复为“缓存就绪”或者显示最后保存时间? 简单起见恢复就绪
                        cacheMessage.textContent = '缓存已就绪';
                    }, 3500);
                }
            }

            // --- 保存到 localStorage ---
            function saveToCache() {
                const content = textarea.value;
                try {
                    localStorage.setItem(STORAGE_KEY, content);
                    // 更新状态栏提示
                    showCacheMessage('✓ 已保存到缓存', false);
                    return true;
                } catch (e) {
                    console.error('缓存写入失败:', e);
                    showCacheMessage('⚠️ 保存失败 (存储空间可能已满)', false);
                    return false;
                }
            }

            // --- 从 localStorage 加载 ---
            function loadFromCache() {
                try {
                    const savedContent = localStorage.getItem(STORAGE_KEY);
                    if (savedContent !== null) {
                        textarea.value = savedContent;
                        updateWordCount();
                        showCacheMessage('↻ 已加载缓存内容', false);
                        return true;
                    } else {
                        // 无缓存内容: 清空或保持，并提示
                        showCacheMessage('📭 暂无缓存记录', false);
                        return false;
                    }
                } catch (e) {
                    console.error('缓存读取失败:', e);
                    showCacheMessage('⚠️ 读取缓存失败', false);
                    return false;
                }
            }

            // --- 清空编辑器内容（仅文本区，不影响缓存）---
            function clearEditor() {
                textarea.value = '';
                updateWordCount();
                showCacheMessage('✗ 编辑器已清空', false);
                // 不改变缓存内容
            }

            // --- 完全清除缓存（仅删除存储的数据，不影响当前编辑器）---
            function clearCache() {
                try {
                    localStorage.removeItem(STORAGE_KEY);
                    showCacheMessage('🧹 缓存数据已清除', false);
                } catch (e) {
                    console.error('清除缓存失败:', e);
                    showCacheMessage('⚠️ 清除缓存失败', false);
                }
            }

            // --- 下载为TXT文件 ---
            function downloadAsTxt() {
                const text = textarea.value;
                const blob = new Blob([text], {type: 'text/plain'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '网页笔记.txt';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            // --- 初始化: 页面加载时自动从缓存读取，并显示在文本框---
            function initializeNotepad() {
                // 尝试加载缓存内容，如果存在就填充；否则文本框为空，提示新建
                const existed = loadFromCache();  // loadFromCache 内部更新字数、提示
                if (!existed) {
                    // 初次使用，没有任何缓存 —— 显示友好的空白提示
                    textarea.value = '';
                    updateWordCount();
                    cacheMessage.textContent = '✨ 写你的第一段笔记';
                } else {
                    // 已加载缓存，更新字数已经在 loadFromCache 里调用 updateWordCount()
                    // 但 loadFromCache 内部调用了 updateWordCount 没问题。
                }

                // 自动保存功能：监听 input 事件，每次修改都写入缓存（防抖处理，提升性能）
                let autoSaveTimer = null;
                textarea.addEventListener('input', function() {
                    // 实时更新字数统计
                    updateWordCount();
                    
                    // 自动保存：防抖，停止输入500ms后保存到缓存
                    if (autoSaveTimer) {
                        clearTimeout(autoSaveTimer);
                    }
                    autoSaveTimer = setTimeout(() => {
                        const saveResult = saveToCache();   // 自动保存并提示
                        if (saveResult) {
                            // 轻提示，但为了避免频繁刷新，可以临时修改状态条
                            // saveToCache 里已调用 showCacheMessage('✓ 已保存到缓存')
                            // 那已经会展示提示，我们不需要额外动作。
                        }
                    }, 600); // 600ms 延迟保存
                });

                // 额外防抖：在页面关闭之前也可以尝试保存，但input防抖已足够。
                // 边缘情况: 万一关闭时最后一次变更未保存？由于使用localStorage同步写入，防抖可能会丢失最后几百毫秒变化。
                // 增强: 在beforeunhook 做一次直接保存。
                window.addEventListener('beforeunload', function() {
                    // 同步保存，保证最末内容不丢
                    const current = textarea.value;
                    if (current !== localStorage.getItem(STORAGE_KEY)) {
                        localStorage.setItem(STORAGE_KEY, current);
                    }
                });
            }

            // --- 绑定手动按钮事件 ---
            // 保存按钮: 立刻将当前文本存入缓存
            saveBtn.addEventListener('click', function() {
                saveToCache();
            });

            // 加载按钮: 从缓存读取并覆盖编辑器内容
            loadBtn.addEventListener('click', function() {
                loadFromCache();
            });

            // 清空编辑器按钮 (仅仅清空文本框，缓存不受影响)
            clearEditorBtn.addEventListener('click', function() {
                clearEditor();
            });

            // 清除缓存按钮 (删除localStorage中的数据，编辑器内容保留不变)
            clearCacheBtn.addEventListener('click', function() {
                clearCache();
            });

            // 下载按钮: 下载当前文本为TXT文件
            downloadBtn.addEventListener('click', function() {
                downloadAsTxt();
            });

            // 额外: 如果用户粘贴/拖拽文本, 字数统计已经通过input更新, 自动保存也工作。
            // 确保字数统计在任何变动时都更新 (初始化)
            // 同时，在编辑器手动通过按钮加载时，updateWordCount 已在 loadFromCache 调用。
            // 但以防万一，loadBtn 执行 loadFromCache 已经包含更新字数。

            // 开始初始化
            initializeNotepad();
        })();
    </script>

    <!-- 
        极简记事本 · 纯文本 · 完全依赖浏览器缓存 (localStorage)
        特点: 自动保存、手动控制、缓存与编辑器操作解耦
        没有任何后端或第三方依赖，离线可用。
    -->
</body>
</html>
